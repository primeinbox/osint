<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerivue Panel ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d1a;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --accent1: #c084fc;
  --accent2: #f472b6;
  --accent3: #67e8f9;
  --text: #e2e8f0;
  --muted: #64748b;
  --glow1: rgba(192,132,252,0.3);
  --glow2: rgba(244,114,182,0.3);
  --glow3: rgba(103,232,249,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

/* Animated background */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.bg-layer::before {
  content:'';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
  top: -200px; left: -200px;
  animation: float1 12s ease-in-out infinite;
}
.bg-layer::after {
  content:'';
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(103,232,249,0.08) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: float2 15s ease-in-out infinite;
}
.bg-orb {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,114,182,0.10) 0%, transparent 70%);
  top: 50%; right: 20%;
  animation: float3 10s ease-in-out infinite;
}

@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
@keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }

/* Stars */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 55%, rgba(192,132,252,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, rgba(103,232,249,0.5) 0%, transparent 100%);
}

/* Telegram banner */
.tg-banner {
  position: fixed;
  top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(13,13,30,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(103,232,249,0.25);
  border-radius: 50px;
  padding: 8px 20px 8px 12px;
  box-shadow: 0 0 20px rgba(103,232,249,0.12), 0 4px 20px rgba(0,0,0,0.4);
  animation: slideDown 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  white-space: nowrap;
  text-decoration: none;
  transition: box-shadow 0.3s, border-color 0.3s;
}
.tg-banner:hover {
  border-color: rgba(103,232,249,0.5);
  box-shadow: 0 0 30px rgba(103,232,249,0.25), 0 4px 30px rgba(0,0,0,0.4);
}
@keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

.tg-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #229ED9, #139fd8);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(34,158,217,0.5);
}
.tg-icon svg { width: 16px; height: 16px; fill: white; }

.tg-text { display: flex; flex-direction: column; line-height: 1.2; }
.tg-label { font-size: 0.6rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.tg-name { font-size: 0.75rem; font-weight: 700; color: var(--accent3); }

.tg-badge {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
  font-size: 0.6rem;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  animation: pulse-badge 2s ease-in-out infinite;
}
@keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.7} }

/* Main layout */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 90px 24px 60px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 50px;
  animation: fadeUp 0.8s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 8px;
}
.logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  box-shadow: 0 0 30px var(--glow1), 0 4px 15px rgba(0,0,0,0.3);
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse { 0%,100%{box-shadow:0 0 30px var(--glow1),0 4px 15px rgba(0,0,0,0.3)} 50%{box-shadow:0 0 50px var(--glow1),0 4px 25px rgba(0,0,0,0.4)} }

.brand-name {
  font-family: 'Orbitron', monospace;
  font-size: 2.4rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
}
.header-sub {
  font-size: 0.82rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 5px 16px;
  border-radius: 20px;
  background: rgba(192,132,252,0.1);
  border: 1px solid rgba(192,132,252,0.2);
  font-size: 0.7rem;
  color: var(--accent1);
  font-weight: 600;
  letter-spacing: 1px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  animation: fadeUp 0.6s ease both;
}
.card:nth-child(1){animation-delay:0.1s}
.card:nth-child(2){animation-delay:0.15s}
.card:nth-child(3){animation-delay:0.2s}
.card:nth-child(4){animation-delay:0.25s}
.card:nth-child(5){animation-delay:0.3s}

.card::before {
  content:'';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events: none;
}
.card:hover {
  transform: translateY(-6px);
  border-color: rgba(192,132,252,0.25);
  box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 30px var(--glow1);
}

.card-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 20px 20px 0 0;
}
.accent-purple { background: linear-gradient(90deg, var(--accent1), var(--accent2)); }
.accent-cyan   { background: linear-gradient(90deg, var(--accent3), #818cf8); }
.accent-pink   { background: linear-gradient(90deg, var(--accent2), #fb923c); }

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.card-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.icon-purple { background: rgba(192,132,252,0.15); }
.icon-cyan   { background: rgba(103,232,249,0.12); }
.icon-pink   { background: rgba(244,114,182,0.12); }

.card-title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
.card-desc  { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

/* Input */
.input-wrap {
  position: relative;
  margin-bottom: 12px;
}
.input-wrap input {
  width: 100%;
  padding: 11px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
}
.input-wrap input::placeholder { color: #475569; }
.input-wrap input:focus {
  border-color: rgba(192,132,252,0.4);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
}

/* Button */
.btn {
  width: 100%;
  padding: 11px;
  border-radius: 12px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-purple { background: linear-gradient(135deg, var(--accent1), #818cf8); color: white; }
.btn-cyan   { background: linear-gradient(135deg, var(--accent3), #818cf8); color: #0d0d1a; }
.btn-pink   { background: linear-gradient(135deg, var(--accent2), var(--accent1)); color: white; }
.btn::after {
  content:'';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn:hover { opacity: 0.9; transform: scale(0.99); }
.btn:hover::after { background: rgba(255,255,255,0.06); }
.btn:active { transform: scale(0.97); }

/* Loading animation inside btn */
.btn.loading::before {
  content:'';
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* Response */
.response-box {
  margin-top: 12px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-size: 0.7rem;
  line-height: 1.6;
  max-height: 180px;
  overflow: auto;
  color: #94a3b8;
  font-family: 'Courier New', monospace;
  transition: all 0.3s;
}
.response-box.active { border-color: rgba(192,132,252,0.2); }
.response-box::-webkit-scrollbar { width: 4px; }
.response-box::-webkit-scrollbar-track { background: transparent; }
.response-box::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.3); border-radius: 4px; }
.response-box pre { white-space: pre-wrap; word-break: break-all; }

.resp-waiting { color: #475569; font-style: italic; font-family: 'Nunito', sans-serif; font-size: 0.72rem; }
.resp-error   { color: #f87171; font-family: 'Nunito', sans-serif; }
.resp-success { color: #86efac; }

/* Status pill */
.status-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.pill-online { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 1.5s infinite; }

/* Footer */
.footer {
  text-align: center;
  padding: 40px 20px 20px;
  position: relative; z-index: 1;
}
.footer-brand {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.footer-text { font-size: 0.68rem; color: var(--muted); }

/* Scrollbar global */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.2); border-radius: 3px; }

/* Anime sparkles */
@keyframes sparkle {
  0%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(180deg)}
  100%{opacity:0;transform:scale(0) rotate(360deg)}
}
.sparkle {
  position: fixed; pointer-events: none; z-index: 9999;
  font-size: 0.9rem;
  animation: sparkle 0.8s ease forwards;
}
</style>
</head>
<body>

<div class="bg-layer"><div class="bg-orb"></div></div>
<div class="stars"></div>

<!-- Telegram Banner -->
<a class="tg-banner" href="https://t.me/aerivue" target="_blank">
  <div class="tg-icon">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.25l-2.01 9.47c-.148.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.873.75z"/></svg>
  </div>
  <div class="tg-text">
    <span class="tg-label">Official Channel</span>
    <span class="tg-name">@Aerivue</span>
  </div>
  <div class="tg-badge">Join Now ✨</div>
</a>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">🌸</div>
      <div class="brand-name">AERIVUE</div>
    </div>
    <div class="header-sub">API Intelligence Panel</div>
    <div class="header-badge">
      <span class="dot"></span>
      All Systems Operational
    </div>
  </div>

  <!-- Grid -->
  <div class="grid" id="apiGrid"></div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-brand">AERIVUE</div>
  <div class="footer-text">Made with 💖 by Aerivue • Anime Aesthetic Dashboard</div>
</div>

<script>
const APIS = [
  {
    id: "lookup", name: "Number Lookup", emoji: "📞",
    desc: "Fetch telecom & user info",
    placeholder: "7234928424", param: "number",
    accent: "accent-purple", icon: "icon-purple", btn: "btn-purple"
  },
  {
    id: "imei", name: "IMEI Info", emoji: "📱",
    desc: "Device identification lookup",
    placeholder: "353010111111110", param: "imei",
    accent: "accent-cyan", icon: "icon-cyan", btn: "btn-cyan"
  },
  {
    id: "aadhar", name: "Aadhar Verify", emoji: "🆔",
    desc: "Identity verification system",
    placeholder: "759028633824", param: "aadhar",
    accent: "accent-pink", icon: "icon-pink", btn: "btn-pink"
  },
  {
    id: "rto", name: "Vehicle Info", emoji: "🚗",
    desc: "RTO registration details",
    placeholder: "KL43G1669", param: "rc",
    accent: "accent-purple", icon: "icon-purple", btn: "btn-purple"
  },
  {
    id: "tg", name: "Telegram User", emoji: "📡",
    desc: "Telegram account details",
    placeholder: "7762198186", param: "userid",
    accent: "accent-cyan", icon: "icon-cyan", btn: "btn-cyan"
  }
];

function renderCards() {
  const grid = document.getElementById('apiGrid');
  grid.innerHTML = '';
  APIS.forEach((api, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-accent ${api.accent}"></div>
      <div class="card-header">
        <div class="card-icon ${api.icon}">${api.emoji}</div>
        <div>
          <div class="card-title">${api.name}</div>
          <div class="card-desc">${api.desc}</div>
        </div>
        <div class="status-pill pill-online" style="margin-left:auto">
          <span class="pill-dot"></span> Live
        </div>
      </div>
      <div class="input-wrap">
        <input type="text" id="input-${api.id}" placeholder="${api.placeholder}" autocomplete="off">
      </div>
      <button class="btn ${api.btn}" id="btn-${api.id}" onclick="fetchData('${api.id}','${api.param}')">
        ✦ Fetch Data
      </button>
      <div class="response-box" id="response-${api.id}">
        <span class="resp-waiting">// Awaiting query...</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

async function fetchData(apiId, paramName) {
  const input = document.getElementById(`input-${apiId}`);
  const btn = document.getElementById(`btn-${apiId}`);
  const responseDiv = document.getElementById(`response-${apiId}`);
  const value = input.value.trim() || input.placeholder;

  btn.classList.add('loading');
  btn.textContent = ' Fetching...';
  btn.disabled = true;
  responseDiv.classList.add('active');
  responseDiv.innerHTML = `<span class="resp-waiting">// Loading data...</span>`;

  try {
    const res = await fetch(`/api/${apiId}?${paramName}=${encodeURIComponent(value)}`);
    const data = await res.json();
    const json = JSON.stringify(data, null, 2);
    responseDiv.innerHTML = `<pre class="resp-success">${escapeHtml(json)}</pre>`;
    spawnSparkles(btn);
  } catch (err) {
    responseDiv.innerHTML = `<span class="resp-error">⚠ Error: Could not reach API endpoint.<br>Make sure the server is running.</span>`;
  } finally {
    btn.classList.remove('loading');
    const api = APIS.find(a => a.id === apiId);
    btn.textContent = '✦ Fetch Data';
    btn.disabled = false;
  }
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function spawnSparkles(el) {
  const rect = el.getBoundingClientRect();
  const icons = ['✨','⭐','💫','🌟','✦','⟡'];
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = icons[Math.floor(Math.random()*icons.length)];
      s.style.left = (rect.left + Math.random() * rect.width) + 'px';
      s.style.top  = (rect.top  + Math.random() * rect.height + window.scrollY) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }, i * 80);
  }
}

renderCards();
</script>
</body>
</html>
