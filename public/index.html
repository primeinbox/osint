<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priya Panel ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    min-height: 100vh;
    padding: 2rem;
    color: #333;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 2rem;
}

.header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: #444;
}

.header p {
    color: #888;
    font-size: 0.9rem;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
}

/* Glass Card */
.card {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.6);
    border-radius: 20px;
    padding: 1rem;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Card Header */
.card-header {
    font-weight: 600;
    margin-bottom: 0.8rem;
    color: #555;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.8);
    margin-bottom: 10px;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #333;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.8;
}

/* Response */
.response {
    margin-top: 10px;
    background: rgba(255,255,255,0.5);
    padding: 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    max-height: 200px;
    overflow: auto;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.7rem;
    color: #aaa;
}
</style>
</head>

<body>

<div class="header">
    <h1>🌸 Priya Panel</h1>
    <p>Elegant API Dashboard • Minimal • Clean • Aesthetic</p>
</div>

<div class="grid" id="apiGrid"></div>

<div class="footer">
    Made with 💖 by Priya
</div>

<script>
const APIS = [
    { id: "lookup", name: "📞 Number Lookup", placeholder: "7234928424", param: "number" },
    { id: "imei", name: "📱 IMEI Info", placeholder: "353010111111110", param: "imei" },
    { id: "aadhar", name: "🆔 Aadhar Verify", placeholder: "759028633824", param: "aadhar" },
    { id: "rto", name: "🚗 Vehicle Info", placeholder: "KL43G1669", param: "rc" },
    { id: "tg", name: "📡 Telegram User", placeholder: "7762198186", param: "userid" }
];

function renderCards() {
    const grid = document.getElementById('apiGrid');
    grid.innerHTML = '';

    APIS.forEach(api => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <div class="card-header">${api.name}</div>
            <input type="text" id="input-${api.id}" placeholder="${api.placeholder}">
            <button onclick="fetchData('${api.id}', '${api.param}')">Fetch Data</button>
            <div class="response" id="response-${api.id}">
                Waiting...
            </div>
        `;

        grid.appendChild(card);
    });
}

async function fetchData(apiId, paramName) {
    const input = document.getElementById(`input-${apiId}`);
    const value = input.value || input.placeholder;
    const responseDiv = document.getElementById(`response-${apiId}`);

    responseDiv.innerHTML = "Loading...";

    try {
        const res = await fetch(`/api/${apiId}?${paramName}=${value}`);
        const data = await res.json();
        responseDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    } catch (err) {
        responseDiv.innerHTML = "Error fetching data";
    }
}

renderCards();
</script>

</body>
</html>
